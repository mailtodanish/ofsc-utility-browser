<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Download All Activities</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
    <div class="mx-auto max-w-3xl p-6">
        <div class="rounded-3xl border border-slate-200 bg-white p-8 shadow-xl shadow-slate-200/50">
            <div class="mb-8">
                <p class="text-sm uppercase tracking-[0.3em] text-sky-600">OFSC Activity Export</p>
                <h1 class="mt-3 text-3xl font-semibold text-slate-900">Download All Activities</h1>
                <p class="mt-2 text-slate-600">Fill in the values below, choose the child activity mode, and export data with includeNonScheduled support.</p>
            </div>

            <form id="activityForm" action="/download_all_activity_including_all_children" method="POST" class="space-y-6">
                <div class="grid gap-4 sm:grid-cols-2">
                    <label class="block">
                        <span class="mb-2 block text-sm font-medium text-slate-700">Client ID</span>
                        <input id="clientId" name="clientId" type="text" required class="w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-slate-900 outline-none transition focus:border-sky-400 focus:ring-2 focus:ring-sky-100" placeholder="Enter OFSC client ID" value="ofscextensionuser"/>
                    </label>

                    <label class="block">
                        <span class="mb-2 block text-sm font-medium text-slate-700">Client Secret</span>
                        <input id="clientSecret" name="clientSecret" type="password" required class="w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-slate-900 outline-none transition focus:border-sky-400 focus:ring-2 focus:ring-sky-100" placeholder="Enter secret" value=""/>
                    </label>
                </div>

                <div class="grid gap-4 sm:grid-cols-2">
                    <label class="block">
                        <span class="mb-2 block text-sm font-medium text-slate-700">Instance URL</span>
                        <input id="instanceUrl" name="instanceUrl" type="text" required class="w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-slate-900 outline-none transition focus:border-sky-400 focus:ring-2 focus:ring-sky-100" placeholder="example.instance" value=""/>
                    </label>

                    <label class="block">
                        <span class="mb-2 block text-sm font-medium text-slate-700">Resources</span>
                        <input id="resources" name="resources" type="text" required class="w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-slate-900 outline-none transition focus:border-sky-400 focus:ring-2 focus:ring-sky-100" placeholder="resource IDs or names" value=""/>
                    </label>
                </div>

                <div class="grid gap-4 sm:grid-cols-2">
                    <label class="block">
                        <span class="mb-2 block text-sm font-medium text-slate-700">Date From</span>
                        <input id="dateFrom" name="dateFrom" type="date" required class="w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-slate-900 outline-none transition focus:border-sky-400 focus:ring-2 focus:ring-sky-100" />
                    </label>

                    <label class="block">
                        <span class="mb-2 block text-sm font-medium text-slate-700">Date To</span>
                        <input id="dateTo" name="dateTo" type="date" required class="w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-slate-900 outline-none transition focus:border-sky-400 focus:ring-2 focus:ring-sky-100" />
                    </label>
                </div>

                <div class="grid gap-4 sm:grid-cols-2">
                    <label class="block">
                        <span class="mb-2 block text-sm font-medium text-slate-700">Fields</span>
                        <input id="fields" name="fields" type="text" required class="w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-slate-900 outline-none transition focus:border-sky-400 focus:ring-2 focus:ring-sky-100" placeholder="fields to include" value=""/>
                    </label>

                    <label class="block relative">
                        <span class="mb-2 block text-sm font-medium text-slate-700">Include Children</span>
                        <select id="includeChildren" name="includeChildren" required class="w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 pr-10 text-slate-900 outline-none transition appearance-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100">
                            <option value="none">None</option>
                            <option value="all">All</option>
                            <option value="immediate">Immediate</option>
                        </select>
                    </label>
                </div>

                <div class="flex flex-col gap-3 rounded-3xl border border-slate-200 bg-slate-50 p-5">
                    <label class="inline-flex items-center gap-3 text-slate-700">
                        <input id="includeNonScheduled" name="includeNonScheduled" type="checkbox" class="h-5 w-5 rounded-lg border-slate-300 text-sky-600 focus:ring-sky-500" />
                        <span class="text-sm font-medium">Include non-scheduled activities</span>
                    </label>
                    <p class="text-sm leading-6 text-slate-500">If checked, the request will include non-scheduled activities in addition to scheduled activity results.</p>
                </div>

                <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
                    <button id="submitButton" type="button" class="inline-flex w-full items-center justify-center rounded-2xl bg-sky-600 px-6 py-3 text-sm font-semibold text-white shadow-lg shadow-sky-500/20 transition hover:bg-sky-700 focus:outline-none focus:ring-2 focus:ring-sky-300 sm:w-auto">Download</button>
                    <div class="rounded-2xl bg-slate-100 px-4 py-3 text-sm text-slate-600">All fields are required.</div>
                </div>
            </form>

            <div id="formOutput" class="mt-6 hidden rounded-3xl border border-slate-200 bg-slate-50 p-5 text-sm text-slate-700"></div>
        </div>
    </div>
    <script src="https://unpkg.com/ofsc-utility-browser/dist/ofsc-utilities-min.js?dev5"></script>

    <script>
       
        const form = document.getElementById('activityForm');
        const output = document.getElementById('formOutput');
        const submitButton = document.getElementById('submitButton');
        submitButton.addEventListener('click', async (event) => {
            event.preventDefault();

            const formData = new FormData(form);
            const values = {
                clientId: String(formData.get('clientId') || '').trim(),
                clientSecret: String(formData.get('clientSecret') || '').trim(),
                instanceUrl: String(formData.get('instanceUrl') || '').trim(),
                resources: String(formData.get('resources') || '').trim(),
                dateFrom: String(formData.get('dateFrom') || '').trim(),
                dateTo: String(formData.get('dateTo') || '').trim(),
                fields: String(formData.get('fields') || '').trim(),
                includeChildren: String(formData.get('includeChildren') || '').trim(),
                includeNonScheduled: formData.get('includeNonScheduled') === 'on'
            };

            const emptyField = Object.entries(values).find(([key, value]) => {
                return key !== 'includeNonScheduled' && value === '';
            });

            if (emptyField) {
                alert(`Please fill in the '${emptyField[0]}' field before submitting.`);
                return;
            }

            output.classList.remove('hidden');
            output.innerHTML = `
                <div class="mb-3 text-sm font-semibold text-slate-900">Collected form values:</div>
                <pre class="overflow-x-auto rounded-2xl bg-white p-4 text-xs text-slate-800">
${JSON.stringify(values, null, 2)}
                </pre>
            `;

            console.log('Form values:', values);

             const res = await window.OFSC.Activity.getAllActivities(
                    values.clientId,
                    values.clientSecret,
                    values.instanceUrl,
                    values.resources,
                    values.dateFrom,
                    values.dateTo,
                    ``,
                    values.fields,
                    includeNonScheduled=false,
                    includeChildren=values.includeChildren
                );
            window.OFSC.Utilities.downloadCSV(res, `activities_from_${values.dateFrom}_to_${values.dateTo}.csv`);
           
        });
    </script>
</body>
</html>
