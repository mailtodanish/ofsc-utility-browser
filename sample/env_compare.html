<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Env Comparator</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --surface2: #1a1a26;
            --border: #2a2a40;
            --accent1: #00e5ff;
            --accent2: #ff4d6d;
            --accent3: #a78bfa;
            --text: #e8e8f0;
            --muted: #b5b5c9;
            --success: #00ffaa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* Toast */
.toast-container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.toast {
    min-width: 220px;
    padding: 12px 16px;
    border-radius: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: #fff;
    background: #222;
    border: 1px solid #444;
    opacity: 0;
    transform: translateX(40px);
    animation: slideIn 0.3s forwards;
}

.toast.success {
    border-left: 4px solid var(--success);
}

.toast.error {
    border-left: 4px solid var(--accent2);
}

@keyframes slideIn {
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

@keyframes fadeOut {
    to {
        opacity: 0;
        transform: translateX(40px);
    }
}

        /* Animated grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
        }

        .orb1 {
            width: 400px;
            height: 400px;
            background: rgba(0, 229, 255, 0.07);
            top: -100px;
            left: -100px;
        }

        .loader {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top: 2px solid #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.btn-compare.loading .btn-inner {
    opacity: 0.7;
    pointer-events: none;
}

        .orb2 {
            width: 350px;
            height: 350px;
            background: rgba(255, 77, 109, 0.06);
            bottom: -80px;
            right: -80px;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 48px;
            animation: fadeDown 0.6s ease both;
        }

        .badge {
            display: inline-block;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent1);
            border: 1px solid rgba(0, 229, 255, 0.3);
            padding: 4px 14px;
            border-radius: 2px;
            margin-bottom: 16px;
        }

        h1 {
            font-size: clamp(28px, 5vw, 52px);
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
        }

        h1 span.env {
            color: var(--accent1);
        }

        h1 span.cmp {
            color: var(--accent2);
        }

        .subtitle {
            margin-top: 10px;
            color: var(--muted);
            font-size: 14px;
            font-family: 'Space Mono', monospace;
        }

        /* Main grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 700px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Env card */
        .env-card {
            background: var(--surface);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
            animation: fadeUp 0.5s ease both;
            transition: border-color 0.3s;
        }

        .env-card:hover {
            border-color: rgba(255, 255, 255, 0.12);
        }

        .env-card:nth-child(1) {
            animation-delay: 0.1s;
        }

        .env-card:nth-child(2) {
            animation-delay: 0.2s;
        }

        .env-header {
            padding: 18px 22px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }

        .env-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 0 0 8px currentColor;
        }

        .env1 .env-dot {
            background: var(--accent1);
            color: var(--accent1);
        }

        .env2 .env-dot {
            background: var(--accent2);
            color: var(--accent2);
        }

        .env-label {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: 'Space Mono', monospace;
            color: var(--muted);
        }

        .env1 .env-label {
            color: var(--accent1);
        }

        .env2 .env-label {
            color: var(--accent2);
        }

        .env-num {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-left: auto;
            color: rgb(242, 235, 235);
        }

        .env-body {
            padding: 22px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field-label {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            font-family: 'Space Mono', monospace;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .field-label::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--border);
        }

        .field-input {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 14px;
            color: var(--text);
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .env1 .field-input:focus {
            border-color: rgba(0, 229, 255, 0.5);
            box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.06);
        }

        .env2 .field-input:focus {
            border-color: rgba(255, 77, 109, 0.5);
            box-shadow: 0 0 0 3px rgba(255, 77, 109, 0.06);
        }

        .field-input::placeholder {
            color: var(--muted);
            opacity: 0.5;
        }

        /* Options card */
        .options-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            animation: fadeUp 0.5s ease 0.3s both;
        }

        .options-header {
            padding: 18px 22px 14px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .options-icon {
            width: 24px;
            height: 24px;
            background: rgba(167, 139, 250, 0.15);
            border: 1px solid rgba(167, 139, 250, 0.3);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .options-title {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent3);
            font-family: 'Space Mono', monospace;
        }

        .checkboxes {
            padding: 22px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .check-item {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 10px 18px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--surface2);
            transition: all 0.2s;
            user-select: none;
        }

        .check-item:hover {
            border-color: rgba(167, 139, 250, 0.4);
        }

        .check-item.checked {
            border-color: rgba(167, 139, 250, 0.6);
            background: rgba(167, 139, 250, 0.08);
        }

        .check-item input[type="checkbox"] {
            display: none;
        }

        .check-box {
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .check-item.checked .check-box {
            background: var(--accent3);
            border-color: var(--accent3);
        }

        .check-mark {
            opacity: 0;
            transform: scale(0);
            transition: all 0.15s;
            font-size: 10px;
            color: #fff;
            font-weight: 700;
        }

        .check-item.checked .check-mark {
            opacity: 1;
            transform: scale(1);
        }

        .check-text {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        /* Compare button */
        .compare-wrap {
            display: flex;
            justify-content: center;
            animation: fadeUp 0.5s ease 0.4s both;
        }

        .btn-compare {
            position: relative;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            outline: none;
        }

        .btn-inner {
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #00e5ff22, #ff4d6d22);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 16px 40px;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text);
            transition: all 0.25s;
            backdrop-filter: blur(8px);
        }

        .btn-compare:hover .btn-inner {
            background: linear-gradient(135deg, #00e5ff33, #ff4d6d33);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 229, 255, 0.1), 0 8px 32px rgba(255, 77, 109, 0.08);
        }

        .btn-compare:active .btn-inner {
            transform: translateY(0);
        }

        .btn-icon {
            font-size: 18px;
        }

        /* Result panel */
        .result-panel {
            margin-top: 24px;
            animation: fadeUp 0.5s ease both;
            display: none;
        }

        .result-panel.visible {
            display: block;
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .result-title {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--success);
            font-family: 'Space Mono', monospace;
        }

        .result-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(0, 255, 170, 0.4), transparent);
        }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 600px) {
            .result-grid {
                grid-template-columns: 1fr;
            }
        }

        .result-card {
            background: var(--surface);
            border-radius: 10px;
            overflow: hidden;
        }

        .result-card-header {
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .result-card.env1 .result-card-header {
            border-bottom: 2px solid var(--accent1);
            color: var(--accent1);
        }

        .result-card.env2 .result-card-header {
            border-bottom: 2px solid var(--accent2);
            color: var(--accent2);
        }

        .result-body {
            padding: 18px;
        }

        .result-row {
            display: flex;
            flex-direction: column;
            gap: 3px;
            margin-bottom: 14px;
        }

        .result-row:last-child {
            margin-bottom: 0;
        }

        .result-key {
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            font-family: 'Space Mono', monospace;
        }

        .result-val {
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            color: var(--text);
            word-break: break-all;
            padding: 7px 10px;
            background: var(--surface2);
            border-radius: 4px;
            border-left: 2px solid transparent;
        }

        .result-card.env1 .result-val {
            border-left-color: var(--accent1);
        }

        .result-card.env2 .result-val {
            border-left-color: var(--accent2);
        }

        .result-val.instance-id {
            font-weight: 700;
            font-size: 14px;
        }

        .result-card.env1 .result-val.instance-id {
            color: var(--accent1);
        }

        .result-card.env2 .result-val.instance-id {
            color: var(--accent2);
        }

        .empty-val {
            color: var(--muted);
            font-style: italic;
            font-size: 11px;
        }

        /* Feature chips */
        .feature-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .chip {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-family: 'Space Mono', monospace;
            letter-spacing: 1px;
            background: rgba(167, 139, 250, 0.12);
            border: 1px solid rgba(167, 139, 250, 0.3);
            color: var(--accent3);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            grid-column: 1 / -1;
            gap: 16px;
            padding: 8px 0;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--muted);
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Animations */
        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Error shake */
        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-6px);
            }

            75% {
                transform: translateX(6px);
            }
        }

        .shake {
            animation: shake 0.3s ease;
        }

        .error-msg {
            display: none;
            text-align: center;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--accent2);
            letter-spacing: 1px;
            margin-top: 12px;
            padding: 10px;
            border: 1px solid rgba(255, 77, 109, 0.2);
            border-radius: 6px;
            background: rgba(255, 77, 109, 0.05);
        }

        .error-msg.show {
            display: block;
        }
    </style>
</head>

<script src="https://unpkg.com/ofsc-utility-browser/dist/ofsc-utilities-min.js?dev14"></script>
   

    <script>
        // Checkbox toggle
        document.querySelectorAll('.check-item').forEach(item => {
            item.addEventListener('click', () => {
                const cb = item.querySelector('input[type="checkbox"]');
                cb.checked = !cb.checked;
                item.classList.toggle('checked', cb.checked);
            });
        });

        function showToast(message, type = "success", duration = 6000) {
    const container = document.getElementById("toastContainer");

    const toast = document.createElement("div");
    toast.className = `toast ${type}`;
    toast.textContent = message;

    container.appendChild(toast);

    setTimeout(() => {
        toast.style.animation = "fadeOut 0.3s forwards";
        setTimeout(() => toast.remove(), 5000);
    }, duration);
}

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.add('show');
            const btn = document.getElementById('compareBtn');
            btn.classList.add('shake');
            setTimeout(() => btn.classList.remove('shake'), 400);
            setTimeout(() => el.classList.remove('show'), 3000);
        }

        async function runCompare() {

             const btn = document.getElementById('compareBtn');
    const btnText = document.getElementById('btnText');
    const btnIcon = document.getElementById('btnIcon');

            const e1Client = document.getElementById('e1-client').value.trim();
            const e1Secret = document.getElementById('e1-secret').value.trim();
            const e1Instance = document.getElementById('e1-instance').value.trim();
            const e2Client = document.getElementById('e2-client').value.trim();
            const e2Secret = document.getElementById('e2-secret').value.trim();
            const e2Instance = document.getElementById('e2-instance').value.trim();

            


            if (!e1Instance || !e2Instance) {
                showError('⚠  Instance ID is required for both environments.');
                return;
            } else if (!e1Client || !e2Client) {
                showError('⚠  Client ID is required for both environments.');
                return;
            } else if (!e1Secret || !e2Secret) {
                showError('⚠  Client Secret is required for both environments.');
                return;
            }



            try { 
                btn.classList.add('loading');
    btnText.textContent = "Comparing...";
    btnIcon.innerHTML = '<div class="loader"></div>';
    btn.disabled = true;


                const resourceTypesChecked = document.querySelector(
                    'input[type="checkbox"][value="resourceTypes"]'
                ).checked;

                if (resourceTypesChecked) {
