<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFSC Download GPS Location of a resource</title>

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container {
            background:#fff;
            padding:40px;
            border-radius:12px;
            width:100%;
            max-width:600px;
        }

        h1 { margin-bottom:10px; }
        .subtitle { margin-bottom:20px; color:#666; }

        .form-group { margin-bottom:15px; }

        label {
            display:block;
            margin-bottom:5px;
            font-size:14px;
            color:#444;
        }

        input {
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:6px;
        }

        button {
            width:100%;
            padding:12px;
            background:#667eea;
            color:#fff;
            border:none;
            border-radius:6px;
            cursor:pointer;
        }

        .status { margin-top:15px; padding:10px; display:none; }
        .success { background:#e8f5e9; }
        .error { background:#ffebee; }
        .info { background:#e3f2fd; }

        .loading {
            border:3px solid rgba(255,255,255,0.3);
            border-top-color:white;
            border-radius:50%;
            width:14px;
            height:14px;
            display:inline-block;
            animation:spin 1s linear infinite;
        }

        @keyframes spin { to { transform:rotate(360deg);} }
    </style>
</head>

<body>

<div class="container">
    <h1>OFSC Download Resource GPS Data</h1>

    <form id="ofscForm">

        <div class="form-group">
            <label>Client ID</label>
            <input type="text" id="clientID" value="ofscextensionuser" required>
        </div>

        <div class="form-group">
            <label>Client Secret</label>
            <input type="password" id="clientSecret" required>
        </div>

        <div class="form-group">
            <label>Instance ID</label>
            <input type="text" id="instanceId" value="dnfieldservices" required>
        </div>

        <div class="form-group">
            <label>Resource ID</label>
            <input type="text" id="resourceId" value="MESSTP">
        </div>

        <!-- ✅ NEW DATE INPUTS -->
        <div class="form-group">
            <label>From Date</label>
            <input type="date" id="fromDate" required>
        </div>

        <div class="form-group">
            <label>To Date</label>
            <input type="date" id="toDate" required>
        </div>

        <button type="submit" id="submitBtn">
            <span id="btnText">Download CSV</span>
        </button>
    </form>

    <div id="status" class="status"></div>
</div>

<script src="http://192.168.1.5:8081/ofsc-utilities-min.js?dev=1"></script>

<script>
const form = document.getElementById('ofscForm');
const submitBtn = document.getElementById('submitBtn');
const btnText = document.getElementById('btnText');
const statusDiv = document.getElementById('status');

const fromDateInput = document.getElementById("fromDate");
const toDateInput = document.getElementById("toDate");

function showStatus(msg, type) {
    statusDiv.textContent = msg;
    statusDiv.className = "status " + type;
    statusDiv.style.display = "block";
}

/**
 * Format date YYYY-MM-DD (safe)
 */
function formatDate(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, "0");
    const d = String(date.getDate()).padStart(2, "0");
    return `${y}-${m}-${d}`;
}

/**
 * Set default dates (last 3 days)
 */
(function setDefaultDates() {
    const today = new Date();
    const past = new Date();
    past.setDate(today.getDate() - 2);

    toDateInput.value = formatDate(today);
    fromDateInput.value = formatDate(past);

    // Prevent future dates
    toDateInput.max = formatDate(today);
    fromDateInput.max = formatDate(today);
})();

function downloadCSV(data) {
    if (!data.length) {
        showStatus("No data to download", "error");
        return;
    }

    const keys = Object.keys(data[0]);
    const csv = [
        keys.join(","),
        ...data.map(row => keys.map(k => `"${row[k] ?? ""}"`).join(","))
    ].join("\n");

    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "resource_position_history.csv";
    a.click();
}

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    submitBtn.disabled = true;
    btnText.innerHTML = 'Processing <span class="loading"></span>';
    showStatus("Fetching data...", "info");

    try {
        const clientID = document.getElementById('clientID').value.trim();
        const clientSecret = document.getElementById('clientSecret').value.trim();
        const instanceId = document.getElementById('instanceId').value.trim();
        const resourceId = document.getElementById('resourceId').value.trim();

        const fromDate = fromDateInput.value;
        const toDate = toDateInput.value;

        // ✅ Validation
        if (!fromDate || !toDate) {
            throw new Error("Please select both From Date and To Date");
        }

        if (fromDate > toDate) {
            throw new Error("From Date cannot be greater than To Date");
        }

        console.log("Calling API with:", { fromDate, toDate });

        // ✅ CALL UPDATED FUNCTION
        let res = await window.OFSC.GPS.resourcePositionHistoryRange(
            clientID,
            clientSecret,
            instanceId,
            resourceId,
            fromDate,
            toDate
        );

        console.log("Raw:", res);

        showStatus(`Downloaded ${res.length} records`, "success");

        // ✅ Download CSV
        downloadCSV(res);

    } catch (err) {
        console.error(err);
        showStatus(err.message || "Failed", "error");
    } finally {
        submitBtn.disabled = false;
        btnText.textContent = "Download CSV";
    }
});
</script>

</body>
</html>
